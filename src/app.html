<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- DS-03 / D-06: FOUC prevention — MUST be first in head, before any stylesheet -->
    <!-- Reads persisted theme from localStorage and applies .dark class + data-theme -->
    <!-- before first paint so Tailwind dark: variants activate instantly -->
    <script>
      (function () {
        var stored = localStorage.getItem('nicu_assistant_theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = stored ? stored === 'dark' : prefersDark;
        // Block transitions during initial paint to prevent flash
        document.documentElement.classList.add('no-transition');
        if (isDark) document.documentElement.classList.add('dark');
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        // Re-enable transitions after first paint
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            document.documentElement.classList.remove('no-transition');
          });
        });
      })();
    </script>
    <!-- DS-04: Plus Jakarta Sans — Google Fonts, loaded async to avoid render-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <meta
      name="description"
      content="Clinical calculator for NICU staff — morphine weaning schedules, infant formula fortification, glucose infusion rate titration, and feed advance volumes."
    />
    <!-- NAV-04: viewport-fit=cover required for iOS safe-area-inset in standalone PWA mode -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <!-- PWA-02: Apple PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NICU Assist" />
    <!-- 42.1-04 D-19: Static root redirect to /morphine-wean.
         Runs synchronously before the rest of the page parses, so visitors
         landing on `/` see /morphine-wean immediately — without waiting on
         SvelteKit hydration. Adapter-static (fallback: 'index.html') means
         this same shell is served for deep links like /uac-uvc, so we gate
         the redirect on `location.pathname === '/'` to leave deep-link
         visits untouched. The meta-refresh + canonical fallback live in
         src/routes/+page.svelte for no-JS clients. -->
    <script>
      if (window.location.pathname === '/') {
        window.location.replace('/morphine-wean');
      }
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
