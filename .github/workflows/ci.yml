name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-test-build:
    name: check + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier format check
        run: pnpm run format:check

      - name: svelte-check
        run: pnpm run check

      - name: Unit tests
        run: pnpm run test:run

      - name: Build
        run: pnpm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ github.sha }}
          path: build
          retention-days: 7

  e2e:
    name: Playwright + axe a11y
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm exec playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report
          retention-days: 14

  lighthouse:
    name: Lighthouse PWA
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: check-test-build
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Start preview server
        run: pnpm run preview --port 4173 &

      - name: Wait for preview
        run: npx --yes wait-on http://localhost:4173 --timeout 30000

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:4173/
            http://localhost:4173/morphine-wean
            http://localhost:4173/formula
            http://localhost:4173/gir
            http://localhost:4173/feeds
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: .github/lighthouserc.json
